<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SRM 첨부파일 일괄 다운로더</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      width: 340px;
      padding: 12px;
      margin: 0;
    }
    h2 {
      font-size: 14px;
      margin: 0;
      color: #333;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .icon-btn {
      width: auto;
      margin: 0;
      padding: 4px 8px;
      background: transparent;
      color: #555;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 3px;
      line-height: 1;
    }
    .icon-btn:hover:not(:disabled) {
      background: #f0f0f0;
      color: #1976d2;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 13px;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      font-size: 14px;
      cursor: pointer;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 3px;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background: #1565c0;
    }
    button.btn-secondary {
      background: white;
      color: #1976d2;
      border: 1px solid #1976d2;
      margin-top: 6px;
      padding: 7px;
      font-size: 13px;
      font-weight: normal;
    }
    button.btn-secondary:hover:not(:disabled) {
      background: #e3f2fd;
      color: #0d47a1;
    }
    #log {
      margin-top: 10px;
      padding: 8px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: Consolas, 'Courier New', monospace;
      border-radius: 3px;
    }
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>SRM 첨부파일 일괄 다운로더</h2>
    <button id="settings" class="icon-btn" title="설정 — 허용 사이트 관리">⚙</button>
  </div>

  <label for="folder">저장 폴더명 (공고명·업체명 등):</label>
  <input id="folder" type="text" placeholder="예: OO전기업체" autofocus>
  <div class="hint">저장 위치: <code>~/Downloads/SRM/&lt;타임스탬프&gt;_&lt;폴더명&gt;/</code></div>

  <button id="download">📥 일괄 다운로드</button>
  <button id="open-folder" class="btn-secondary" title="가장 최근 SRM 다운로드 폴더를 탐색기로 열기">📁 다운로드 폴더 열기</button>

  <div id="log">준비됨. 첨부파일이 보이는 SRM 페이지에서 폴더명 입력 후 [일괄 다운로드] 클릭.</div>

  <script src="popup.js"></script>
</body>
</html>
